<script>
// ===================================================================
// Pattern Clash — Game Class
// ===================================================================
const PC_GRID_COLS   = 5;
const PC_MEMORIZE_MS = 3000;            // 3 seconds to memorize
const PC_INPUT_MS    = 60 * 60 * 1000; // 60 minutes to fill the pattern

class PatternClashGame extends BaseGame {
  constructor(){
    super();
    this.gameMode = 'turn_based';
    this.state    = null;
    this._cells   = [];
    this._timerInterval = null;
    this._mySelection   = [];
    this._submitted     = false;
  }

  // ── called once on game load ───────────────────────────────────
  init(state){
    this.state = state;
    this._buildGrid();
    this._buildDualGrids();
    this._renderAll();
    // Always start with the memorize phase (client-side) regardless of server phase
    this._doMemorize();
  }

  // ── called on every server state broadcast ─────────────────────
  update(state){
    const prev = this.state;
    // Detect new round: current_round incremented
    const isNewRound = prev && prev.current_round !== state.current_round;
    this.state = state;

    if(state.paused){ this._showPause(); return; }
    this._hidePause();
    this._renderAll();

    // New round started — always run memorize first
    if(isNewRound){
      this._doMemorize();
    }
  }

  onRoundEnd(result){
    this._stopTimer();
    // Show my grid result colors, then open the dual-grid overlay
    this._showGridResult(result.game_state);
    setTimeout(()=> this._showRoundResult(result), 600);
  }

  onGameEnd(result){
    this._stopTimer();
    const isWin  = result.game_winner === USER;
    const isDraw = result.game_winner === 'draw';
    const icon  = document.getElementById('pc-end-icon');
    const title = document.getElementById('pc-end-title');
    const sub   = document.getElementById('pc-end-sub');
    if(isDraw){icon.textContent='🤝';title.textContent="IT'S A DRAW!";}
    else if(isWin){icon.textContent='🏆';title.textContent='YOU WIN!';this._confetti();}
    else{icon.textContent='😞';title.textContent='YOU LOST';}
    if(sub) sub.textContent='Returning to lobby...';
    const ov = document.getElementById('pc-end-overlay');
    if(ov) ov.style.display='flex';
  }

  // ── Build the 5×5 grid ─────────────────────────────────────────
  _buildGrid(){
    const grid = document.getElementById('pc-grid');
    if(!grid) return;
    grid.innerHTML = '';
    this._cells = [];
    for(let i=0; i < PC_GRID_COLS*PC_GRID_COLS; i++){
      const c = document.createElement('div');
      c.className = 'pc-cell pc-off';
      c.dataset.idx = i;
      c.addEventListener('pointerdown',(e)=>{ e.preventDefault(); this._toggleCell(i); });
      grid.appendChild(c);
      this._cells.push(c);
    }
  }

  _buildDualGrids(){
    ['pc-dual-grid1','pc-dual-grid2'].forEach(id=>{
      const g = document.getElementById(id);
      if(!g) return;
      g.innerHTML='';
      for(let i=0;i<25;i++){
        const c = document.createElement('div');
        c.className='pc-dual-cell';
        g.appendChild(c);
      }
    });
  }

  // ── Full render sync ───────────────────────────────────────────
  _renderAll(){
    if(!this.state) return;
    this._updateTopBar();
    this._updatePhaseLabel();
  }

  _updateTopBar(){
    const {players, scores, round_wins, current_round, total_rounds} = this.state;
    const p1 = players['P1'], p2 = players['P2'];

    // Names
    this._setText('pc-mc-name1', p1);
    this._setText('pc-mc-name2', p2);
    // Scores (cumulative)
    this._setText('pc-mc-score1', scores[p1] ?? 0);
    this._setText('pc-mc-score2', scores[p2] ?? 0);
    // Round badge
    this._setText('pc-round-badge', `R ${current_round}/${total_rounds}`);
    // Win dots
    this._setWinDots('pc-mc-wins1', round_wins[p1]||0, total_rounds, 'pc-mc-p1');
    this._setWinDots('pc-mc-wins2', round_wins[p2]||0, total_rounds, 'pc-mc-p2');
    // Avatars
    this._setAvatar('pc-mc-av1', p1);
    this._setAvatar('pc-mc-av2', p2);
  }

  _setWinDots(elId, wins, total, colorClass){
    const el = document.getElementById(elId);
    if(!el) return;
    const isPink = colorClass === 'pc-mc-p2';
    el.innerHTML = '';
    for(let i=0;i<total;i++){
      const s = document.createElement('span');
      s.className = 'pw-dot ' + (i<wins ? 'pw-won' : 'pw-empty');
      el.appendChild(s);
    }
  }

  _setAvatar(elId, username){
    const el = document.getElementById(elId);
    if(!el || el.querySelector('img')) return;
    if(typeof window.players !== 'undefined'){
      const pd = window.players[username];
      if(pd && pd.gender){
        const src = pd.gender==='female' ? '/static/games/icons/avatar_female.png' : '/static/games/icons/avatar_male.png';
        el.innerHTML = `<img src="${src}" alt="av">`;
      }
    }
  }

  _updatePhaseLabel(){
    const {phase} = this.state;
    const lbl = document.getElementById('pc-phase-lbl');
    if(!lbl) return;
    const map = {memorize:'MEMORIZE', input:'YOUR TURN', result:'RESULT', idle:'READY'};
    lbl.textContent = map[phase] || phase.toUpperCase();
  }

  // ── MEMORIZE phase — cells light up directly on the grid ──────
  _doMemorize(){
    this._mySelection = [];
    this._submitted   = false;

    // Close any stale overlays/popups
    const toHide = ['pc-wait-overlay','pc-result-overlay'];
    toHide.forEach(id=>{ const el=document.getElementById(id); if(el) el.style.display='none'; });

    const pattern = this.state ? this.state.pattern || [] : [];

    // Reset grid — visible but not interactive
    this._cells.forEach(c=>{ c.className='pc-cell pc-off'; });
    this._setButtons(false);

    // Show MEMORIZE status in the status bar (no overlay)
    this._statusMsg('👁  MEMORIZE!',
      `Remember ${pattern.length} glowing cell${pattern.length!==1?'s':''} — 3 seconds!`,
      'ps-mem', '👁');
    this._setText('pc-phase-lbl','MEMORIZE');

    // Light cells with a fast stagger so they all appear in ~0.5s
    pattern.forEach((idx, i)=>{
      setTimeout(()=>{
        if(this._cells[idx]) this._cells[idx].classList.add('pc-lit');
      }, 20 + i * 40);
    });

    // Timer bar turns YELLOW for 3s countdown
    this._stopTimer();
    const fill = document.getElementById('pc-timer-fill');
    if(fill){
      fill.classList.add('mem-mode');
      fill.style.width = '100%';
    }
    const memStart = Date.now();
    this._timerInterval = setInterval(()=>{
      const pct = Math.max(0, 1-(Date.now()-memStart)/PC_MEMORIZE_MS)*100;
      if(fill) fill.style.width = pct+'%';
      if(pct <= 0){ clearInterval(this._timerInterval); this._timerInterval = null; }
    }, 80);

    // After 3s: remove lit cells → start input
    setTimeout(()=>{
      this._stopTimer();
      if(fill){
        fill.classList.remove('mem-mode'); // back to cyan-pink gradient
        fill.style.width = '100%';
      }
      this._cells.forEach(c=>c.classList.remove('pc-lit'));
      this._startInput();
    }, PC_MEMORIZE_MS);
  }

  // ── INPUT phase ────────────────────────────────────────────────
  _startInput(){
    this._mySelection = [];
    this._submitted   = false;

    // Close any overlays
    const memOv = document.getElementById('pc-mem-overlay');
    if(memOv) memOv.style.display='none';
    document.getElementById('pc-wait-overlay').style.display='none';

    // Enable cells for clicking
    this._cells.forEach(c=>{ c.className='pc-cell'; });
    this._setButtons(true);

    // Update status
    this._statusMsg('🧠  RECREATE THE PATTERN', 'Tap the cells you remember!', 'ps-go', '🧠');
    this._setText('pc-phase-lbl','YOUR TURN');

    // Timer — 60 minutes (effectively unlimited)
    this._stopTimer();
    this._startTimer(PC_INPUT_MS, ()=>{ if(!this._submitted) this.submitGrid(); });
  }

  _toggleCell(idx){
    if(this._submitted) return;
    if(!this._cells[idx] || this._cells[idx].classList.contains('pc-off')) return;
    const pos = this._mySelection.indexOf(idx);
    if(pos >= 0){
      this._mySelection.splice(pos,1);
      this._cells[idx].classList.remove('pc-selected');
    } else {
      this._mySelection.push(idx);
      this._cells[idx].classList.add('pc-selected');
    }
  }

  clearGrid(){
    if(this._submitted) return;
    this._mySelection = [];
    this._cells.forEach(c=>c.classList.remove('pc-selected'));
  }

  submitGrid(){
    if(this._submitted) return;
    this._submitted = true;
    this._stopTimer();
    this._setButtons(false);
    // Disable cell interaction
    this._cells.forEach(c=>c.classList.add('pc-off'));
    // Show waiting overlay
    document.getElementById('pc-wait-overlay').style.display='flex';
    // Update status
    this._statusMsg('⏳  SUBMITTED!','Waiting for opponent...','ps-wait','⏳');
    // Send to server
    this.sendMove('submit', {selection: this._mySelection});
  }

  // ── Show grid result colors ────────────────────────────────────
  _showGridResult(state){
    if(!state) return;
    const pattern = state.pattern || [];
    const myName  = USER;
    const mySel   = (state.submissions || {})[myName] || [];

    this._cells.forEach((c,i)=>{
      c.className = 'pc-cell pc-off';
      const inPattern = pattern.includes(i);
      const inSel     = mySel.includes(i);
      if(inPattern && inSel)   c.classList.add('pc-correct');
      else if(!inPattern && inSel) c.classList.add('pc-wrong');
      else if(inPattern && !inSel) c.classList.add('pc-missed');
    });
  }

  _getOpponentName(state){
    if(!state) return '';
    const p1 = state.players['P1'], p2 = state.players['P2'];
    return p1 === USER ? p2 : p1;
  }

  // ── Fill dual-grid result ──────────────────────────────────────
  _fillDualGrid(gridId, selection, pattern){
    const grid = document.getElementById(gridId);
    if(!grid) return;
    const cells = grid.querySelectorAll('.pc-dual-cell');
    cells.forEach((c,i)=>{
      c.className='pc-dual-cell';
      const inPat = pattern.includes(i);
      const inSel = selection.includes(i);
      if(inPat && inSel)     c.classList.add('pk-correct');
      else if(!inPat && inSel) c.classList.add('pk-wrong');
      else if(inPat && !inSel) c.classList.add('pk-missed');
    });
  }

  // ── Round result overlay (dual-grid) ──────────────────────────
  _showRoundResult(result){
    const state = result.game_state || this.state;
    if(!state) return;

    const p1n     = state.players['P1'], p2n = state.players['P2'];
    const rs      = state.round_scores || {};
    const s1      = rs[p1n] || {correct:0,wrong:0,missed:0,total:0};
    const s2      = rs[p2n] || {correct:0,wrong:0,missed:0,total:0};
    const rw      = result.round_winner;
    const pattern = state.pattern || [];
    const subs    = state.submissions || {};

    // Names
    this._setText('pc-dual-name1', p1n);
    this._setText('pc-dual-name2', p2n);

    // Fill grids
    this._fillDualGrid('pc-dual-grid1', subs[p1n] || [], pattern);
    this._fillDualGrid('pc-dual-grid2', subs[p2n] || [], pattern);

    // Points
    const pts1 = document.getElementById('pc-dual-pts1');
    const pts2 = document.getElementById('pc-dual-pts2');
    if(pts1){ pts1.textContent=(s1.total>=0?'+':'')+s1.total; pts1.className='pc-dual-pts '+(s1.total>=0?'pc-pts-pos':'pc-pts-neg'); }
    if(pts2){ pts2.textContent=(s2.total>=0?'+':'')+s2.total; pts2.className='pc-dual-pts '+(s2.total>=0?'pc-pts-pos':'pc-pts-neg'); }

    // Detail
    this._setText('pc-dual-detail1', `✓${s1.correct} ✗${s1.wrong} ○${s1.missed}`);
    this._setText('pc-dual-detail2', `✓${s2.correct} ✗${s2.wrong} ○${s2.missed}`);

    // Winner highlight
    const side1 = document.getElementById('pc-dual-p1');
    const side2 = document.getElementById('pc-dual-p2');
    side1.classList.remove('pc-winner-side'); side2.classList.remove('pc-winner-side');
    if(rw === p1n) side1.classList.add('pc-winner-side');
    else if(rw === p2n) side2.classList.add('pc-winner-side');

    // Winner banner
    const wt = document.getElementById('pc-res-winner');
    if(wt){
      if(rw==='draw'){ wt.textContent="IT'S A TIE!"; wt.style.color='#ffe600'; }
      else if(rw===USER){ wt.textContent='🏆 YOU WIN THE ROUND!'; wt.style.color='#39ff14'; }
      else{ wt.textContent=`${rw} WINS THE ROUND`; wt.style.color='#ff2d95'; }
    }

    const sub = document.getElementById('pc-res-sub');
    if(sub) sub.textContent = result.game_ended ? 'Final result coming up...' : 'Next round in 4s...';

    // Hide wait overlay, show result
    const waitOv2 = document.getElementById('pc-wait-overlay');
    if(waitOv2) waitOv2.style.display='none';

    const ov = document.getElementById('pc-result-overlay');
    if(ov) ov.style.display='flex';
    const delay = result.reveal_at ? Math.max(0, result.reveal_at - Date.now()) : 0;
    const displayMs = result.display_ms || 5000;
    setTimeout(()=>{ if(ov) ov.style.display='flex'; }, delay);
    setTimeout(()=>{ if(ov && !result.game_ended) ov.style.display='none'; }, delay + displayMs);
  }

  // ── Timer ──────────────────────────────────────────────────────
  _startTimer(ms, onEnd){
    this._stopTimer();
    const fill  = document.getElementById('pc-timer-fill');
    const start = Date.now();
    if(fill) fill.style.width='100%';
    this._timerInterval = setInterval(()=>{
      const pct = Math.max(0, 1-(Date.now()-start)/ms)*100;
      if(fill) fill.style.width = pct+'%';
      if(pct<=0){ this._stopTimer(); if(onEnd) onEnd(); }
    }, 80);
  }
  _stopTimer(){
    clearInterval(this._timerInterval);
    this._timerInterval = null;
    const f = document.getElementById('pc-timer-fill');
    if(f) f.style.width='0%';
  }

  // ── Status helper ──────────────────────────────────────────────
  _statusMsg(main, hint, cls, icon){
    const m = document.getElementById('pc-status-msg');
    const h = document.getElementById('pc-status-hint');
    const ic= document.getElementById('pc-status-icon');
    if(m){ m.className='pc-status-msg '+(cls||''); m.textContent=main; }
    if(h) h.textContent=hint||'';
    if(ic) ic.textContent=icon||'';
  }

  // ── Pause ──────────────────────────────────────────────────────
  _showPause(){
    const ov = document.getElementById('pc-pause-overlay');
    if(ov) ov.style.display='flex';
    const dis=(this.state.disconnected_players||[])[0]||'Player';
    this._setText('pc-disconnected', dis);
  }
  _hidePause(){
    const ov = document.getElementById('pc-pause-overlay');
    if(ov) ov.style.display='none';
  }

  updateCountdown(s){
    this._setText('pc-countdown', s);
  }

  // ── Buttons ────────────────────────────────────────────────────
  _setButtons(enabled){
    const done  = document.getElementById('pc-btn-done');
    const clear = document.getElementById('pc-btn-clear');
    if(done) done.disabled = !enabled;
    if(clear) clear.disabled = !enabled;
  }

  // ── Generic helpers ────────────────────────────────────────────
  _setText(id, val){
    const el = document.getElementById(id);
    if(el) el.textContent = val;
  }

  _confetti(){
    const colors=['#00f0ff','#ff2d95','#b026ff','#39ff14','#ffe600'];
    for(let i=0;i<36;i++){
      setTimeout(()=>{
        const c=document.createElement('div');
        c.style.cssText=`position:fixed;width:7px;height:7px;top:-20px;left:${Math.random()*100}%;
          background:${colors[~~(Math.random()*colors.length)]};
          border-radius:${Math.random()>.5?'50%':'2px'};
          animation:pcConfall ${1.4+Math.random()*2}s linear forwards;z-index:300;`;
        document.body.appendChild(c);
        c.addEventListener('animationend',()=>c.remove());
      }, i*45);
    }
    if(!document.getElementById('pcConfKF')){
      const s=document.createElement('style');s.id='pcConfKF';
      s.textContent='@keyframes pcConfall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}';
      document.head.appendChild(s);
    }
  }
}

// Register
window.GameClasses = window.GameClasses || {};
window.GameClasses.patternclash = PatternClashGame;

// Exit
window.exitGame = window.exitGame || function(){
  if(confirm('Leave game? Both players return to lobby.')){
    if(typeof socket!=='undefined' && socket && socket.readyState===WebSocket.OPEN)
      socket.send(JSON.stringify({event:'game_exit'}));
  }
};
</script>

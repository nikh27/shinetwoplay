<!-- Simon Duel — Online Multiplayer UI -->

<div class="sd-wrap">

  <!-- ========== TOP BAR ========== -->
  <div class="sd-topbar">
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="sd-ico-btn" onclick="exitGame()" title="Back">✕</button>
      <button class="sd-ico-btn" id="sd-mic-btn" onclick="window.voiceChat && window.voiceChat.toggleMic()" title="Mic">🎤</button>
      <button class="sd-ico-btn" id="sd-spk-btn" onclick="window.voiceChat && window.voiceChat.toggleSpeaker()" title="Speaker">🔊</button>
    </div>
    <div class="sd-round-badge" id="sd-round-badge">Round 1/1</div>
  </div><!-- /topbar -->

  <!-- ========== PLAYER CARDS ========== -->
  <div class="sd-players">
    <!-- P1 -->
    <div class="sd-pcard sd-p1" id="sd-card-p1">
      <div class="sd-pcard-avatar" id="sd-avatar-p1"></div>
      <div class="sd-pcard-name" id="sd-name-p1">Player 1</div>
      <div class="sd-pcard-score" id="sd-score-p1">0</div>
    </div>
    <!-- P2 -->
    <div class="sd-pcard sd-p2" id="sd-card-p2">
      <div class="sd-pcard-avatar" id="sd-avatar-p2"></div>
      <div class="sd-pcard-name" id="sd-name-p2">Player 2</div>
      <div class="sd-pcard-score" id="sd-score-p2">0</div>
    </div>
  </div><!-- /players -->

  <!-- ========== GAME MSG / GUIDE ========== -->
  <div class="sd-status">
    <div class="sd-seq-len" id="sd-seqlen"></div>
    <div class="sd-msg" id="sd-msg">Waiting...</div>
    <div class="sd-hint" id="sd-hint"></div>
  </div>

  <!-- ========== SIMON BOARD ========== -->
  <div class="sd-bwrap">
    <div class="sd-board sd-off" id="sd-board">
      <button class="sd-btn sd-green" data-c="green" onclick="currentGame && currentGame.handleColorClick('green')">
        <div class="sd-d"></div><div class="sd-s"></div><div class="sd-b"></div>
      </button>
      <button class="sd-btn sd-red" data-c="red" onclick="currentGame && currentGame.handleColorClick('red')">
        <div class="sd-d"></div><div class="sd-s"></div><div class="sd-b"></div>
      </button>
      <button class="sd-btn sd-yellow" data-c="yellow" onclick="currentGame && currentGame.handleColorClick('yellow')">
        <div class="sd-d"></div><div class="sd-s"></div><div class="sd-b"></div>
      </button>
      <button class="sd-btn sd-blue" data-c="blue" onclick="currentGame && currentGame.handleColorClick('blue')">
        <div class="sd-d"></div><div class="sd-s"></div><div class="sd-b"></div>
      </button>
    </div>
    <!-- Center orb -->
    <div class="sd-orb">
      <div class="sd-orb-inner">
        <div class="sd-pip" id="sd-pip1"></div>
        <div class="sd-pip" id="sd-pip2"></div>
      </div>
    </div>
  </div><!-- /bwrap -->

  <!-- ========== SEQUENCE TRACK DOTS ========== -->
  <div class="sd-track" id="sd-track"></div>



  <!-- ========== PAUSE OVERLAY ========== -->
  <div class="sd-overlay sd-pause-ov" id="sd-pause-ov" style="display:none;">
    <div class="sd-modal">
      <div style="font-size:48px">⏸️</div>
      <h2>Game Paused</h2>
      <p><span id="sd-disconnected">Player</span> disconnected</p>
      <p>Waiting... <span id="sd-countdown">30</span>s</p>
    </div>
  </div>

  <!-- ========== ROUND / GAME RESULT OVERLAY ========== -->
  <div class="sd-overlay sd-result-ov" id="sd-result-ov" style="display:none;">
    <div class="sd-modal">
      <div id="sd-res-icon" style="font-size:52px;margin-bottom:8px;">🏆</div>
      <h2 id="sd-res-title">You Win!</h2>
      <p id="sd-res-sub" style="color:rgba(255,255,255,.5);font-size:13px;margin-top:6px;">Next round starting...</p>
    </div>
  </div>

</div><!-- /sd-wrap -->

<!-- ========== CSS ========== -->
<style>
/* — reset scoped to sd- — */

<script>
{ // guard to prevent re-declaration errors
// ========== AUDIO ENGINE ==========
const sdAC = window.AudioContext || window.webkitAudioContext;
let sdAx;
function sdInitAudio(){ if(!sdAx) sdAx = new sdAC(); }
const SD_FREQ = {green:392, red:330, yellow:262, blue:466};

function sdTone(c, ms=200){
  if(!sdAx) return;
  const o=sdAx.createOscillator(), g=sdAx.createGain();
  o.type='sine'; o.frequency.value = SD_FREQ[c]||400;
  g.gain.setValueAtTime(.22, sdAx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001, sdAx.currentTime+ms/1000);
  o.connect(g); g.connect(sdAx.destination); o.start(); o.stop(sdAx.currentTime+ms/1000);
}
function sdBuzz(){
  if(!sdAx) return;
  const o=sdAx.createOscillator(), g=sdAx.createGain();
  o.type='sawtooth'; o.frequency.value=72;
  g.gain.setValueAtTime(.28, sdAx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001, sdAx.currentTime+.45);
  o.connect(g); g.connect(sdAx.destination); o.start(); o.stop(sdAx.currentTime+.45);
}
function sdFanfare(){
  if(!sdAx) return;
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>{
    const o=sdAx.createOscillator(),g=sdAx.createGain();
    o.type='sine'; o.frequency.value=f;
    g.gain.setValueAtTime(.18,sdAx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,sdAx.currentTime+.35);
    o.connect(g); g.connect(sdAx.destination); o.start(); o.stop(sdAx.currentTime+.35);
  }, i*130));
}

// ========== HELPER: flash a button (default 1 second so both players clearly see it) ==========
function sdFlashBtn(color, ms=1000){
  const el = document.querySelector(`.sd-btn.sd-${color}`);
  if(!el) return;
  el.classList.add('sd-tap','sd-lit');
  sdTone(color, Math.min(ms, 400)); // sound is shorter than visual
  setTimeout(()=>el.classList.remove('sd-tap','sd-lit'), ms);
}

// ========== SIMON DUEL GAME CLASS ==========
const SD_CMAP = {green:'dk-cg', red:'dk-cr', yellow:'dk-cy', blue:'dk-cb'};

class SimonDuelGame extends BaseGame {
  constructor(){
    super();
    this.gameMode = 'turn_based';
    this.state = null;
    this._blocked = false;
  }

  // Called once when game first loads
  init(state){
    sdInitAudio();
    this.state = state;
    this._renderAll();
  }

  // Called on every server state update
  update(state){
    const prev = this.state;
    this.state = state;
    this._renderAll();

    // If previous phase was 'fail' and now it's something else, show shake
    if(prev && prev.phase === 'fail' && state.phase !== 'fail'){
      const board = document.getElementById('sd-board');
      if(board){ board.classList.add('sd-shake'); setTimeout(()=>board.classList.remove('sd-shake'),400); }
    }

    // Pause state
    if(state.paused) this._showPause();
    else this._hidePause();
  }

  // Round ended
  onRoundEnd(result){
    const isWinner = result.round_winner && result.round_winner === USER;
    const isDraw   = result.round_winner === 'draw';

    // Play sound
    if(isWinner)      sdFanfare();
    else if(!isDraw)  sdBuzz();

    const icon  = document.getElementById('sd-res-icon');
    const title = document.getElementById('sd-res-title');
    const sub   = document.getElementById('sd-res-sub');

    if(isDraw){
      icon.textContent='🤝'; title.textContent="It's a Draw!";
    } else if(isWinner){
      icon.textContent='🏆'; title.textContent='Round Won!';
      this._confetti();
    } else {
      icon.textContent='😔'; title.textContent='Round Lost';
    }

    if(result.game_ended){
      sub.textContent = 'See final result...';
    } else {
      sub.innerHTML  = 'Next round in <span id="sd-nxt-timer">3</span>s...';
      let t=3;
      const iv = setInterval(()=>{
        t--;
        const el = document.getElementById('sd-nxt-timer');
        if(el) el.textContent=t;
        if(t<=0) clearInterval(iv);
      },1000);
    }

    const delay = result.reveal_at ? Math.max(0, result.reveal_at - Date.now()) : 0;
    setTimeout(()=>{
      const ov = document.getElementById('sd-result-ov');
      if(ov) ov.style.display='flex';
      const displayMs = result.display_ms || 3000;
      setTimeout(()=>{ if(ov) ov.style.display='none'; },displayMs);
    }, delay);
  }

  // Game ended
  onGameEnd(result){
    const isWinner = result.game_winner === USER;
    const isDraw   = result.game_winner === 'draw';

    if(isWinner) sdFanfare();

    const icon  = document.getElementById('sd-res-icon');
    const title = document.getElementById('sd-res-title');
    const sub   = document.getElementById('sd-res-sub');

    if(isDraw){
      icon.textContent='🤝'; title.textContent='Game Draw!';
    } else if(isWinner){
      icon.textContent='🎉'; title.textContent='You Won!';
      this._confetti();
    } else {
      icon.textContent='😞'; title.textContent='Game Over';
    }

    const scores = result.final_scores;
    if(scores){
      sub.textContent = 'Returning to lobby...';
    }

    const ov = document.getElementById('sd-result-ov');
    if(ov) ov.style.display='flex';
  }

  // ---- Color button tap (from onclick) ----
  handleColorClick(color){
    if(!this.state) return;
    if(this._blocked) return;
    if(this.state.paused) return;

    const board = document.getElementById('sd-board');
    if(board && board.classList.contains('sd-off')) return;

    sdInitAudio();
    // Flash locally for 1 second
    sdFlashBtn(color, 1000);
    // Relay this tap to opponent so they also see it light up
    this.sendInput({color});

    this._blocked = true;
    setTimeout(()=>this._blocked=false, 1100);

    // Determine which action to send
    const phase = this.state.phase;
    let action;
    if(phase === 'add' || phase === 'add-after'){
      action = 'add_color';
    } else if(phase === 'repeat'){
      action = 'repeat_color';
    } else {
      return; // fail or gameover — not interactable
    }

    this.sendMove(action, {color});
  }

  // ---- Opponent pressed a color — show it for 1 second ----
  onRemoteInput(player, inputData){
    const color = inputData && inputData.color;
    if(color) sdFlashBtn(color, 1000);
  }

  // ---- Full render ----
  _renderAll(){
    if(!this.state) return;
    this._updatePlayers();
    this._updateScores();
    this._updateMsg();
    this._updateDots();
    this._updateOrb();
    this._updateBackground();
  }

  _updatePlayers(){
    const {players} = this.state;
    const p1name = players['P1'], p2name = players['P2'];
    this._setText('sd-name-p1', p1name);
    this._setText('sd-name-p2', p2name);
    // Avatars
    if(typeof window.players !== 'undefined'){
      const setAvatar = (id, username) => {
        const pd = window.players[username];
        if(pd && pd.gender){
          const src = pd.gender === 'female' ? '/static/games/icons/avatar_female.png' : '/static/games/icons/avatar_male.png';
          const el = document.getElementById(id);
          if(el && !el.querySelector('img')) el.innerHTML = `<img src="${src}" alt="avatar">`;
        }
      };
      setAvatar('sd-avatar-p1', p1name);
      setAvatar('sd-avatar-p2', p2name);
    }
    // Round badge
    const rb = document.getElementById('sd-round-badge');
    if(rb) rb.textContent = `Round ${this.state.current_round}/${this.state.total_rounds}`;
    // Active highlight
    const cp = this.state.current_player;
    const active = !['fail','gameover'].includes(this.state.phase);
    document.getElementById('sd-card-p1').classList.toggle('sd-active', cp==='P1' && active);
    document.getElementById('sd-card-p2').classList.toggle('sd-active', cp==='P2' && active);
  }

  _updateScores(){
    const {players, scores} = this.state;
    this._setText('sd-score-p1', scores[players['P1']] || 0);
    this._setText('sd-score-p2', scores[players['P2']] || 0);
  }


  _updateBackground(){
    const wrap = document.querySelector('.sd-wrap');
    if(!wrap || !this.state) return;
    const cp = this.state.current_player;
    const phase = this.state.phase;
    wrap.classList.remove('sd-bg-p1','sd-bg-p2');
    if(phase !== 'fail' && phase !== 'gameover'){
      wrap.classList.add(cp === 'P1' ? 'sd-bg-p1' : 'sd-bg-p2');
    }
  }

  _updateMsg(){
    const {phase, current_player, players, seq} = this.state;
    const msg  = document.getElementById('sd-msg');
    const hint = document.getElementById('sd-hint');
    const slen = document.getElementById('sd-seqlen');
    const board = document.getElementById('sd-board');
    if(!msg) return;

    const cpName = players[current_player];
    const myTurn = cpName === USER;

    // Sequence length
    if(slen) slen.textContent = seq.length > 0 ? `SEQUENCE · ${seq.length}` : '';

    msg.className = 'sd-msg';
    switch(phase){
      case 'add':
        if(myTurn){
          msg.classList.add('m-add');
          msg.textContent = '🎨  PICK ANY COLOR';
          if(hint) hint.textContent = 'Tap one button – you start the sequence!';
        } else {
          msg.classList.add('m-wait');
          msg.textContent = `${cpName.toUpperCase()} IS CHOOSING`;
          if(hint) hint.textContent = 'Watch what color they pick...';
        }
        if(board) board.classList.toggle('sd-off', !myTurn);
        break;

      case 'add-after':
        if(myTurn){
          msg.classList.add('m-add');
          msg.textContent = '➕  ADD ONE MORE';
          if(hint) hint.textContent = 'You remembered them all! Now add 1 new color.';
        } else {
          msg.classList.add('m-wait');
          msg.textContent = `${cpName.toUpperCase()} ADDING COLOR`;
          if(hint) hint.textContent = 'They\'ll add one more to the sequence...';
        }
        if(board) board.classList.toggle('sd-off', !myTurn);
        break;

      case 'repeat':
        if(myTurn){
          msg.classList.add('m-go');
          msg.textContent = '🧠  REPEAT IT!';
          if(hint) hint.textContent = `Tap all ${seq.length} color${seq.length>1?'s':''} in the right order!`;
        } else {
          msg.classList.add('m-watch');
          msg.textContent = `${cpName.toUpperCase()} REPEATING`;
          if(hint) hint.textContent = `Watch – can they remember ${seq.length} color${seq.length>1?'s':''}?`;
        }
        if(board) board.classList.toggle('sd-off', !myTurn);
        break;

      case 'fail':
        msg.classList.add('m-fail');
        msg.textContent = '❌  WRONG COLOR!';
        if(hint) hint.textContent = 'Round goes to the other player!';
        if(board) board.classList.add('sd-off');
        break;

      default:
        msg.textContent = 'GET READY...';
        if(hint) hint.textContent = '';
    }
  }

  _updateDots(){
    const track = document.getElementById('sd-track');
    if(!track) return;
    const {phase, seq, repeat_idx} = this.state;
    track.innerHTML = '';

    if(phase === 'repeat'){
      seq.forEach((c, i)=>{
        const d = document.createElement('div');
        if(i < repeat_idx)      d.className = `sd-dot ${SD_CMAP[c]} dk-ok`;
        else if(i === repeat_idx) d.className = 'sd-dot dk-hid dk-now';
        else                    d.className = 'sd-dot dk-hid dk-wait';
        track.appendChild(d);
      });
      const p = document.createElement('div');
      p.className = 'sd-dot dk-plus dk-wait';
      track.appendChild(p);

    } else if(phase === 'add-after'){
      seq.forEach(c=>{
        const d = document.createElement('div');
        d.className = `sd-dot ${SD_CMAP[c]} dk-ok`;
        track.appendChild(d);
      });
      const p = document.createElement('div');
      p.className = 'sd-dot dk-plus dk-now';
      track.appendChild(p);

    } else if(phase === 'add'){
      const p = document.createElement('div');
      p.className = 'sd-dot dk-plus dk-now';
      track.appendChild(p);

    } else {
      // show filled sequence
      seq.forEach(c=>{
        const d = document.createElement('div');
        d.className = `sd-dot ${SD_CMAP[c]} dk-ok`;
        track.appendChild(d);
      });
    }
  }

  _updateOrb(){
    const {current_player, phase} = this.state;
    const active = !['fail','gameover'].includes(phase);
    const p1 = document.getElementById('sd-pip1');
    const p2 = document.getElementById('sd-pip2');
    if(!p1||!p2) return;
    p1.className = 'sd-pip'; p2.className = 'sd-pip';
    if(active){
      if(current_player==='P1') p1.classList.add('sd-p1a');
      else p2.classList.add('sd-p2a');
    }
  }

  _updateBoard(){
    // Board on/off is handled in _updateMsg; no extra logic needed here
  }

  // ---- Helpers ----
  _setText(id, val){
    const el = document.getElementById(id);
    if(el) el.textContent = val;
  }

  _showPause(){
    const ov = document.getElementById('sd-pause-ov');
    if(ov) ov.style.display='flex';
    const dis = (this.state.disconnected_players||[])[0]||'Player';
    const d = document.getElementById('sd-disconnected');
    if(d) d.textContent = dis;
  }
  _hidePause(){
    const ov = document.getElementById('sd-pause-ov');
    if(ov) ov.style.display='none';
  }

  updateCountdown(s){
    const el = document.getElementById('sd-countdown');
    if(el) el.textContent = s;
  }

  _confetti(){
    const colors = ['#ff6ec7','#00e5ff','#ffea00','#00e676','#ff1744','#a855f7','#69f0ae'];
    for(let i=0;i<32;i++){
      setTimeout(()=>{
        const c = document.createElement('div');
        c.style.cssText=`position:fixed;width:8px;height:8px;top:-20px;left:${Math.random()*100}%;
          background:${colors[~~(Math.random()*colors.length)]};
          border-radius:${Math.random()>.5?'50%':'2px'};
          animation:sdConfettiFall ${1.5+Math.random()*2}s linear forwards;z-index:200;`;
        document.body.appendChild(c);
        c.addEventListener('animationend',()=>c.remove());
      }, i*40);
    }
    // inject keyframes once
    if(!document.getElementById('sdConfKF')){
      const s=document.createElement('style'); s.id='sdConfKF';
      s.textContent='@keyframes sdConfettiFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}';
      document.head.appendChild(s);
    }
  }
}

// Register
window.GameClasses = window.GameClasses || {};
window.GameClasses.simonduel = SimonDuelGame;

// Exit game
window.exitGame = function(){
  if(confirm('Leave the game? Both players will return to lobby.')){
    if(typeof socket !== 'undefined' && socket && socket.readyState === WebSocket.OPEN){
      socket.send(JSON.stringify({event:'game_exit'}));
    }
  }
};
} // end guard
</script>

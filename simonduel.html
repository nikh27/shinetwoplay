<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Simon Duel</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --red:#ff1744;--green:#00e676;--blue:#2979ff;--yellow:#ffea00;
  --bg:#060618;--surf:#0c0c28;--surf2:#13133a;
  --p1:#ff6ec7;--p2:#00e5ff;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Exo 2',sans-serif;
  background:var(--bg);
  color:#fff;
  touch-action:manipulation;
  user-select:none;
}

/* === AMBIENT BG === */
.bg-glow{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 30% 10%,rgba(255,110,199,.07),transparent 50%),
    radial-gradient(ellipse at 70% 90%,rgba(0,229,255,.06),transparent 50%);
}
.bg-grid{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:44px 44px;
}

/* === LAYOUT === */
.app{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  height:100dvh;padding:12px 14px 18px;
  justify-content:space-between;
}
.top{display:flex;flex-direction:column;align-items:center;width:100%;gap:6px}

/* === LOGO === */
.logo{
  font-family:'Orbitron',sans-serif;font-weight:900;font-size:22px;
  letter-spacing:10px;text-align:center;
  background:linear-gradient(135deg,var(--p1),#a855f7,var(--p2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 18px rgba(255,110,199,.2));
}

/* === PLAYERS === */
.players{display:flex;gap:10px;width:100%;max-width:360px}
.pcard{
  flex:1;background:var(--surf);border-radius:16px;
  padding:10px 8px 8px;text-align:center;
  border:2px solid transparent;
  transition:all .4s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
}
.pcard::after{
  content:'';position:absolute;inset:0;border-radius:16px;
  opacity:0;transition:opacity .4s;
}
.pcard.p1::after{background:linear-gradient(135deg,var(--p1),transparent)}
.pcard.p2::after{background:linear-gradient(135deg,var(--p2),transparent)}
.pcard.on{transform:scale(1.04)}
.pcard.on::after{opacity:.1}
.pcard.p1.on{border-color:var(--p1);box-shadow:0 0 28px rgba(255,110,199,.18)}
.pcard.p2.on{border-color:var(--p2);box-shadow:0 0 28px rgba(0,229,255,.18)}
.pcard.dead{opacity:.25;filter:grayscale(.6)}
.ptag{
  font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:3px;position:relative;z-index:1;
}
.p1 .ptag{color:var(--p1)}.p2 .ptag{color:var(--p2)}
.pscore{
  font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;
  line-height:1.15;position:relative;z-index:1;
}
.plives{font-size:13px;letter-spacing:2px;position:relative;z-index:1}
.lf-on{color:#ff4477}.lf-off{color:#ffffff12}

/* === STATUS === */
.status{text-align:center;min-height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.sround{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:5px;color:#ffffff28;margin-bottom:2px}
.smsg{
  font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:2px;transition:all .3s;
}
.sinfo{font-size:10px;color:#ffffff44;margin-top:2px;letter-spacing:1px}
.smsg.watch{color:#ffea00}.smsg.go{color:#00e676}
.smsg.add{color:#ce93d8}.smsg.fail{color:#ff1744}.smsg.nice{color:#69f0ae}

/* === BOARD === */
.bwrap{
  position:relative;
  width:min(80vw,330px);height:min(80vw,330px);
  perspective:700px;flex-shrink:0;
}
.board{
  width:100%;height:100%;
  display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;
  gap:10px;
  transform:rotateX(10deg);
  transform-style:preserve-3d;
  transition:transform .4s;
}
.board.off{pointer-events:none}

/* === 3D BUTTONS === */
.sb{
  position:relative;border:none;cursor:pointer;
  transform-style:preserve-3d;
  transition:transform .07s ease-out;
  outline:none;background:none;
}
.sb .d{position:absolute;inset:0;border-radius:inherit}
.sb .s{
  position:absolute;inset:0;border-radius:inherit;
  transform:translateZ(14px);
  border:1.5px solid rgba(255,255,255,.06);
  transition:filter .1s,box-shadow .1s;
  overflow:hidden;
}
.sb .s::before{
  content:'';position:absolute;top:8%;left:14%;width:42%;height:25%;
  border-radius:50%;
  background:linear-gradient(180deg,rgba(255,255,255,.13),transparent);
  pointer-events:none;transition:opacity .1s;
}
.sb .b{
  position:absolute;inset:20%;border-radius:50%;
  opacity:0;filter:blur(24px);
  transform:translateZ(16px);
  pointer-events:none;transition:opacity .1s;
}

.sb.green .d{background:#004d29}.sb.green .s{background:linear-gradient(145deg,#00c960,#00e676)}.sb.green .b{background:#69f0ae}
.sb.red .d{background:#6b0a1e}.sb.red .s{background:linear-gradient(145deg,#d01040,#ff1744)}.sb.red .b{background:#ff5252}
.sb.yellow .d{background:#6b5f00}.sb.yellow .s{background:linear-gradient(145deg,#d4c200,#ffea00)}.sb.yellow .b{background:#ffff8d}
.sb.blue .d{background:#0a2e6b}.sb.blue .s{background:linear-gradient(145deg,#1c6ae0,#2979ff)}.sb.blue .b{background:#82b1ff}

.sb.lit .s{filter:brightness(2) saturate(1.5);box-shadow:0 0 28px rgba(255,255,255,.15)}
.sb.lit .b{opacity:.85}
.sb.lit .s::before{opacity:.45}
.sb.green.lit{filter:drop-shadow(0 0 22px #00e67655)}
.sb.red.lit{filter:drop-shadow(0 0 22px #ff174455)}
.sb.yellow.lit{filter:drop-shadow(0 0 22px #ffea0055)}
.sb.blue.lit{filter:drop-shadow(0 0 22px #2979ff55)}

.sb.tap{transform:scale(.95)}
.sb.tap .s{transform:translateZ(5px);filter:brightness(2.4) saturate(1.7);box-shadow:0 0 35px rgba(255,255,255,.22)}
.sb.tap .b{opacity:1}

.sb:nth-child(1),.sb:nth-child(1) .d,.sb:nth-child(1) .s{border-radius:50% 18px 18px 18px}
.sb:nth-child(2),.sb:nth-child(2) .d,.sb:nth-child(2) .s{border-radius:18px 50% 18px 18px}
.sb:nth-child(3),.sb:nth-child(3) .d,.sb:nth-child(3) .s{border-radius:18px 18px 18px 50%}
.sb:nth-child(4),.sb:nth-child(4) .d,.sb:nth-child(4) .s{border-radius:18px 18px 50% 18px}

/* === CENTER ORB === */
.orb{
  position:absolute;top:50%;left:50%;
  width:64px;height:64px;
  transform:translate(-50%,-50%) translateZ(16px) rotateX(-10deg);
  border-radius:50%;z-index:10;
  background:radial-gradient(circle at 38% 32%,var(--surf2),#08081a);
  border:2px solid #ffffff0a;
  box-shadow:0 0 40px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.04);
  display:flex;align-items:center;justify-content:center;
}
.orb-inner{
  width:42px;height:42px;border-radius:50%;
  border:2px solid #ffffff0a;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.pip{
  width:8px;height:8px;border-radius:50%;
  background:#ffffff14;transition:all .4s;
}
.pip.p1a{background:var(--p1);box-shadow:0 0 10px var(--p1);animation:ppulse 1.2s infinite}
.pip.p2a{background:var(--p2);box-shadow:0 0 10px var(--p2);animation:ppulse 1.2s infinite}
@keyframes ppulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.75);opacity:.45}}

/* === PROGRESS TRACK === */
.track{
  display:flex;gap:5px;align-items:center;justify-content:center;
  flex-wrap:wrap;min-height:24px;max-width:340px;padding:4px 8px;
}
.dot{
  width:10px;height:10px;border-radius:50%;
  transition:all .2s ease;
}
.dot.ok{opacity:1;box-shadow:0 0 6px currentColor}
.dot.now{opacity:1;transform:scale(1.45);box-shadow:0 0 10px currentColor}
.dot.wait{opacity:.18}
.dot.cg{background:var(--green);color:var(--green)}
.dot.cr{background:var(--red);color:var(--red)}
.dot.cy{background:var(--yellow);color:var(--yellow)}
.dot.cb{background:var(--blue);color:var(--blue)}
.dot.hid{background:#ffffff30;color:#ffffff30}
.dot.plus{
  background:none;border:2px dashed #ffffff40;
  width:12px;height:12px;box-shadow:none;
  animation:pblink 1.2s infinite;
}
@keyframes pblink{0%,100%{border-color:#ffffff50}50%{border-color:#ffffff15}}

/* === BUTTONS === */
.bottom{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;max-width:340px}
.btn{
  font-family:'Orbitron',sans-serif;font-weight:700;font-size:13px;
  letter-spacing:4px;border:none;border-radius:50px;
  padding:14px 40px;cursor:pointer;
  transition:all .2s;text-transform:uppercase;
  width:100%;max-width:260px;
}
.btn.go{
  background:linear-gradient(135deg,var(--p1),#a855f7,var(--p2));
  color:#fff;box-shadow:0 4px 26px rgba(168,85,247,.28);
}
.btn.go:active{transform:scale(.95)}
.btn.ghost{
  background:transparent;color:#ffffff40;
  border:1px solid #ffffff10;padding:10px 28px;font-size:10px;
}
.btn.ghost:active{transform:scale(.95)}
.hide{display:none!important}

/* === PASS SCREEN === */
.pass{
  position:fixed;inset:0;z-index:90;
  background:rgba(4,4,18,.97);
  backdrop-filter:blur(20px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .35s;
}
.pass.show{opacity:1;pointer-events:all}
.pass-ico{font-size:48px;margin-bottom:16px;animation:bob 1.8s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.pass-who{
  font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;
  letter-spacing:5px;margin-bottom:4px;
}
.pass-who.c1{color:var(--p1)}.pass-who.c2{color:var(--p2)}
.pass-hint{font-size:13px;color:#ffffff55;margin-bottom:6px}
.pass-seq{
  font-family:'Orbitron',sans-serif;font-size:11px;
  color:#ffffff33;letter-spacing:3px;margin-bottom:24px;
}

/* === OVERLAY === */
.ov{
  position:fixed;inset:0;z-index:100;
  background:rgba(4,4,18,.94);
  backdrop-filter:blur(18px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .5s;
}
.ov.show{opacity:1;pointer-events:all}
.modal{
  text-align:center;padding:32px 24px;max-width:300px;width:90%;
  transform:translateY(20px) scale(.9);transition:transform .5s cubic-bezier(.22,.68,0,1.2);
}
.ov.show .modal{transform:translateY(0) scale(1)}
.m-ico{font-size:52px;margin-bottom:10px}
.m-title{
  font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;
  letter-spacing:4px;margin-bottom:8px;
}
.m-sub{font-size:13px;color:#ffffff55;margin-bottom:24px;line-height:1.6}

/* === FX === */
@keyframes shake{
  0%,100%{transform:translateX(0) rotateX(10deg)}
  20%{transform:translateX(-8px) rotateX(10deg)}
  40%{transform:translateX(8px) rotateX(10deg)}
  60%{transform:translateX(-4px) rotateX(10deg)}
  80%{transform:translateX(4px) rotateX(10deg)}
}
.board.shake{animation:shake .4s ease}

.particles{position:fixed;inset:0;pointer-events:none;z-index:99;overflow:hidden}
.pt{position:absolute;border-radius:50%;animation:ptup 1.8s ease-out forwards}
@keyframes ptup{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-260px) scale(0)}}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="bg-grid"></div>

<div class="app">
  <div class="top">
    <div class="logo">SIMON DUEL</div>
    <div class="players">
      <div class="pcard p1" id="c1">
        <div class="ptag">PLAYER 1</div>
        <div class="pscore" id="s1">0</div>
        <div class="plives" id="l1"></div>
      </div>
      <div class="pcard p2" id="c2">
        <div class="ptag">PLAYER 2</div>
        <div class="pscore" id="s2">0</div>
        <div class="plives" id="l2"></div>
      </div>
    </div>
    <div class="status">
      <div class="sround" id="rnd"></div>
      <div class="smsg" id="msg">PRESS START</div>
      <div class="sinfo" id="info"></div>
    </div>
  </div>

  <div class="bwrap">
    <div class="board off" id="board">
      <button class="sb green" data-c="green"><div class="d"></div><div class="s"></div><div class="b"></div></button>
      <button class="sb red" data-c="red"><div class="d"></div><div class="s"></div><div class="b"></div></button>
      <button class="sb yellow" data-c="yellow"><div class="d"></div><div class="s"></div><div class="b"></div></button>
      <button class="sb blue" data-c="blue"><div class="d"></div><div class="s"></div><div class="b"></div></button>
    </div>
    <div class="orb">
      <div class="orb-inner">
        <div class="pip" id="pp1"></div>
        <div class="pip" id="pp2"></div>
      </div>
    </div>
  </div>

  <div class="track" id="track"></div>

  <div class="bottom">
    <button class="btn go" id="bStart">START GAME</button>
    <button class="btn ghost hide" id="bReset">RESET</button>
  </div>
</div>

<!-- PASS PHONE -->
<div class="pass" id="pass">
  <div class="pass-ico" id="pIco">📱</div>
  <div class="pass-who" id="pWho">PLAYER 1</div>
  <div class="pass-hint" id="pHint">Pass the phone</div>
  <div class="pass-seq" id="pSeq"></div>
  <button class="btn go" id="bReady">I'M READY</button>
</div>

<!-- WIN -->
<div class="ov" id="ov">
  <div class="modal">
    <div class="m-ico" id="oIco">🏆</div>
    <div class="m-title" id="oTtl"></div>
    <div class="m-sub" id="oSub"></div>
    <button class="btn go" id="bAgain">PLAY AGAIN</button>
  </div>
</div>

<div class="particles" id="ptcls"></div>

<script>
// ===== AUDIO =====
const AC=window.AudioContext||window.webkitAudioContext;
let ax;
function ia(){if(!ax)ax=new AC()}
const FR={green:392,red:330,yellow:262,blue:466};
function tone(c,ms=220){
  if(!ax)return;
  const o=ax.createOscillator(),g=ax.createGain();
  o.type='sine';o.frequency.value=FR[c]||400;
  g.gain.setValueAtTime(.22,ax.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ax.currentTime+ms/1000);
  o.connect(g);g.connect(ax.destination);o.start();o.stop(ax.currentTime+ms/1000);
}
function buzz(){
  if(!ax)return;
  const o=ax.createOscillator(),g=ax.createGain();
  o.type='sawtooth';o.frequency.value=72;
  g.gain.setValueAtTime(.28,ax.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ax.currentTime+.45);
  o.connect(g);g.connect(ax.destination);o.start();o.stop(ax.currentTime+.45);
}
function fanfare(){
  if(!ax)return;
  [523,659,784,1047].forEach((f,i)=>{
    setTimeout(()=>{
      const o=ax.createOscillator(),g=ax.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(.18,ax.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ax.currentTime+.35);
      o.connect(g);g.connect(ax.destination);o.start();o.stop(ax.currentTime+.35);
    },i*130);
  });
}

// ===== STATE =====
// FLOW: P1 adds 1 color → P2 repeats all + adds 1 → P1 repeats all + adds 1 → ...
// NO computer replay. Pure memory.

const COLORS=['green','red','yellow','blue'];
const CMAP={green:'cg',red:'cr',yellow:'cy',blue:'cb'};
let G;

function init(){
  return{
    seq:[],        // the full sequence
    turn:1,        // 1 or 2
    round:0,
    scores:[0,0],
    lives:[3,3],
    phase:'idle',  // idle | add | repeat | add-after | fail | gameover
    idx:0,         // current repeat index
  };
}

// ===== DOM =====
const $=s=>document.querySelector(s);
const board=$('#board');
const msg=$('#msg');
const info=$('#info');
const rnd=$('#rnd');
const track=$('#track');
const pass=$('#pass');
const ov=$('#ov');

// ===== BTN FX =====
function tap(c){
  const el=$(`.sb.${c}`);
  el.classList.add('tap','lit');
  tone(c,200);
  setTimeout(()=>el.classList.remove('tap','lit'),200);
}

// ===== UI =====
function ui(){
  $('#s1').textContent=G.scores[0];
  $('#s2').textContent=G.scores[1];

  ['l1','l2'].forEach((id,i)=>{
    const el=$('#'+id),n=Math.max(0,G.lives[i]);
    let h='';
    for(let j=0;j<3;j++) h+=`<span class="${j<n?'lf-on':'lf-off'}">♥</span>`;
    el.innerHTML=h;
  });

  const active=!['idle','gameover'].includes(G.phase);
  $('#c1').classList.toggle('on',G.turn===1&&active);
  $('#c2').classList.toggle('on',G.turn===2&&active);
  $('#c1').classList.toggle('dead',G.lives[0]<=0);
  $('#c2').classList.toggle('dead',G.lives[1]<=0);

  const p1=$('#pp1'),p2=$('#pp2');
  p1.className='pip';p2.className='pip';
  if(active){
    if(G.turn===1)p1.classList.add('p1a');
    else p2.classList.add('p2a');
  }
  rnd.textContent=G.seq.length>0?`SEQUENCE · ${G.seq.length}`:'';
  dots();
}

function dots(){
  track.innerHTML='';
  if(G.phase==='repeat'){
    // show dots for items to repeat (hidden colors) + progress
    for(let i=0;i<G.seq.length;i++){
      const d=document.createElement('div');
      if(i<G.idx){
        d.className=`dot ${CMAP[G.seq[i]]} ok`;
      } else if(i===G.idx){
        d.className='dot hid now';
      } else {
        d.className='dot hid wait';
      }
      track.appendChild(d);
    }
    // plus marker
    const p=document.createElement('div');
    p.className='dot plus wait';
    track.appendChild(p);
  } else if(G.phase==='add-after'){
    for(let i=0;i<G.seq.length;i++){
      const d=document.createElement('div');
      d.className=`dot ${CMAP[G.seq[i]]} ok`;
      track.appendChild(d);
    }
    const p=document.createElement('div');
    p.className='dot plus now';
    track.appendChild(p);
  } else if(G.phase==='add'){
    // first move, just show plus
    const p=document.createElement('div');
    p.className='dot plus now';
    track.appendChild(p);
  } else {
    for(let i=0;i<G.seq.length;i++){
      const d=document.createElement('div');
      d.className=`dot ${CMAP[G.seq[i]]} ok`;
      track.appendChild(d);
    }
  }
}

// ===== GAME =====
function startGame(){
  ia();
  G=init();G.turn=1;G.round=1;
  ui();
  $('#bStart').classList.add('hide');
  $('#bReset').classList.remove('hide');
  ov.classList.remove('show');
  pass.classList.remove('show');

  // P1 starts: just add a color
  G.phase='add';
  board.classList.remove('off');
  msg.textContent='P1 PICK A COLOR';
  msg.className='smsg add';
  info.textContent='start the sequence!';
  ui();
}

function showPass(nextP, seqLen, cb){
  board.classList.add('off');
  G.phase='idle';
  ui();

  $('#pIco').textContent=nextP===1?'👈':'👉';
  $('#pWho').textContent=`PLAYER ${nextP}`;
  $('#pWho').className='pass-who '+(nextP===1?'c1':'c2');
  $('#pHint').textContent='Hand the phone over';
  $('#pSeq').textContent=`${seqLen} COLORS TO REPEAT + ADD 1`;
  pass.classList.add('show');

  $('#bReady').onclick=()=>{
    pass.classList.remove('show');
    cb();
  };
}

function beginRepeat(){
  G.phase='repeat';
  G.idx=0;
  board.classList.remove('off');
  msg.textContent=`P${G.turn} REPEAT`;
  msg.className='smsg go';
  info.textContent=`${G.seq.length} colors from memory`;
  ui();
}

function handleTap(color){
  if(G.phase==='add'||G.phase==='add-after'){
    // Player is adding a new color
    tap(color);
    G.seq.push(color);
    G.scores[G.turn-1]=G.seq.length;
    board.classList.add('off');
    
    msg.textContent='NICE!';
    msg.className='smsg nice';
    info.textContent='';
    G.phase='idle';
    ui();

    const next=G.turn===1?2:1;

    if(G.lives[next-1]<=0){
      setTimeout(()=>endGame(G.turn),900);
      return;
    }

    G.turn=next;
    G.round++;

    setTimeout(()=>{
      showPass(next, G.seq.length, ()=>beginRepeat());
    },800);

  } else if(G.phase==='repeat'){
    tap(color);
    if(color!==G.seq[G.idx]){
      fail();
      return;
    }
    G.idx++;
    ui();
    if(G.idx>=G.seq.length){
      // Done repeating! Now add one
      board.classList.add('off');
      setTimeout(()=>{
        G.phase='add-after';
        board.classList.remove('off');
        msg.textContent=`P${G.turn} ADD 1`;
        msg.className='smsg add';
        info.textContent='pick any color';
        ui();
      },300);
    }
  }
}

function fail(){
  G.phase='fail';
  board.classList.add('off','shake');
  buzz();
  setTimeout(()=>board.classList.remove('shake'),400);

  G.lives[G.turn-1]--;
  msg.textContent=`P${G.turn} WRONG!`;
  msg.className='smsg fail';
  info.textContent=G.lives[G.turn-1]>0?`${G.lives[G.turn-1]} lives left`:'eliminated!';
  ui();

  // Check end
  if(G.lives[G.turn-1]<=0){
    const other=G.turn===1?2:1;
    if(G.lives[other-1]<=0) setTimeout(()=>endGame(0),1100);
    else setTimeout(()=>endGame(other),1100);
    return;
  }

  // Failed → other player's turn with the SAME sequence
  const next=G.turn===1?2:1;

  if(G.lives[next-1]<=0){
    // Other already dead, same player retries
    G.turn=G.turn;
    setTimeout(()=>{
      showPass(G.turn, G.seq.length, ()=>beginRepeat());
    },1200);
    return;
  }

  G.turn=next;
  G.round++;
  setTimeout(()=>{
    showPass(next, G.seq.length, ()=>beginRepeat());
  },1200);
}

function endGame(w){
  G.phase='gameover';
  board.classList.add('off');
  ui();

  if(w===0){
    $('#oIco').textContent='🤝';
    $('#oTtl').textContent="IT'S A TIE";
    $('#oTtl').style.cssText='background:linear-gradient(135deg,var(--p1),var(--p2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;';
  } else {
    $('#oIco').textContent='🏆';
    $('#oTtl').textContent=`PLAYER ${w} WINS`;
    const c=w===1?'var(--p1),#ff9ecf':'var(--p2),#80f0ff';
    $('#oTtl').style.cssText=`background:linear-gradient(135deg,${c});-webkit-background-clip:text;-webkit-text-fill-color:transparent;`;
    particles(w===1?'#ff6ec7':'#00e5ff');
    fanfare();
  }
  $('#oSub').textContent=`Sequence reached ${G.seq.length}\nP1: ${G.scores[0]}  ·  P2: ${G.scores[1]}`;
  ov.classList.add('show');
}

function particles(col){
  const el=$('#ptcls');
  for(let i=0;i<30;i++){
    const p=document.createElement('div');
    p.className='pt';
    p.style.left=Math.random()*100+'%';
    p.style.top=50+Math.random()*50+'%';
    const sz=4+Math.random()*10;
    p.style.width=p.style.height=sz+'px';
    p.style.background=col;
    p.style.animationDelay=Math.random()*.7+'s';
    p.style.animationDuration=(1+Math.random()*.8)+'s';
    el.appendChild(p);
    setTimeout(()=>p.remove(),3000);
  }
}

// ===== EVENTS =====
document.querySelectorAll('.sb').forEach(btn=>{
  btn.addEventListener('pointerdown',e=>{
    e.preventDefault();
    if(board.classList.contains('off'))return;
    handleTap(btn.dataset.c);
  });
});

$('#bStart').addEventListener('click',startGame);
$('#bAgain').addEventListener('click',startGame);
$('#bReset').addEventListener('click',()=>{
  G=init();
  board.classList.add('off');
  msg.textContent='PRESS START';
  msg.className='smsg';
  info.textContent='';
  pass.classList.remove('show');
  ov.classList.remove('show');
  ui();
  $('#bStart').classList.remove('hide');
  $('#bReset').classList.add('hide');
});

ui();
</script>
</body>

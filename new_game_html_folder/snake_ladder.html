<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snakes & Ladders</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:#111827}
body{display:flex;align-items:center;justify-content:center}

/* ── Container ── */
.game-container{
  display:flex;flex-direction:column;align-items:center;
  width:100%;height:100dvh;max-width:580px;
  padding:6px 8px 4px;position:relative;overflow:hidden;
}

/* ── Top Bar (match Ludo) ── */
.top-bar{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;margin-bottom:4px;flex-shrink:0;
}
.top-left{display:flex;gap:6px;align-items:center}
.icon-btn{
  width:34px;height:34px;border-radius:50%;border:none;
  background:rgba(255,255,255,.12);color:#fff;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(10px);transition:background .2s;
  -webkit-tap-highlight-color:transparent;
}
.icon-btn:hover{background:rgba(255,255,255,.25)}
.icon-btn.muted{background:rgba(239,68,68,.3);color:#fca5a5}
.round-badge{
  background:rgba(255,255,255,.15);color:#fff;padding:4px 14px;
  border-radius:20px;font-size:12px;font-weight:600;backdrop-filter:blur(10px);
}

/* ── Instruction ── */
.instruction{
  width:100%;text-align:center;font-size:12px;font-weight:700;
  color:#fef08a;margin-bottom:4px;min-height:18px;flex-shrink:0;
}

/* ── Board Area ── */
.board-wrapper{
  position:relative;
  width:min(calc(100vw - 16px), calc(100dvh - 200px));
  max-width:560px;aspect-ratio:1;flex-shrink:0;
  background:#1f2937;border-radius:14px;padding:5px;
  border:2px solid #374151;box-shadow:0 0 30px rgba(0,0,0,.6);
  margin:0 auto;
}
.board-inner{position:relative;width:100%;height:100%;border-radius:10px;overflow:hidden}
.board-inner canvas{display:block;width:100%;height:100%}

/* ── Bottom Bar (match Ludo: Red Panel | Dice | Blue Panel) ── */
.bottom-bar{
  display:flex;flex-direction:row;align-items:flex-end;justify-content:space-between;
  width:min(calc(100vw - 16px), calc(100dvh - 200px));
  max-width:560px;margin:6px auto 0;padding:0 4px;flex-shrink:0;
}

/* ── Player Panel ── */
.player-panel{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:#1f2937;border:2px solid rgba(107,114,128,.4);
  border-radius:14px;padding:6px 10px;min-width:72px;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);opacity:.55;
}
.player-panel.active-turn{
  transform:translateY(-8px) scale(1.06);opacity:1;
  box-shadow:0 8px 24px rgba(0,0,0,.4);
  animation:border-pulse 1.5s infinite;
}
@keyframes border-pulse{
  0%,100%{border-color:rgba(255,255,255,.2)}
  50%{border-color:rgba(255,255,255,.75)}
}
.panel-red.active-turn{border-color:#f87171;box-shadow:0 8px 24px rgba(248,113,113,.5)}
.panel-blue.active-turn{border-color:#60a5fa;box-shadow:0 8px 24px rgba(96,165,250,.5)}

.panel-avatar{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;border:2.5px solid rgba(255,255,255,.4);
  background:rgba(255,255,255,.08);
}
.panel-red .panel-avatar{border-color:#f87171;background:rgba(248,113,113,.15)}
.panel-blue .panel-avatar{border-color:#60a5fa;background:rgba(96,165,250,.15)}
.panel-name{
  font-size:10px;font-weight:800;color:#e5e7eb;
  text-transform:uppercase;letter-spacing:.05em;
  max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;
}
.panel-red .panel-name{color:#fca5a5}
.panel-blue .panel-name{color:#93c5fd}
.panel-pos{font-size:9px;color:#6b7280;font-weight:600}

/* ── Center Dice Area ── */
.center-dice{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}

/* 3D Dice */
.dice-scene{width:54px;height:54px;perspective:300px;position:relative}
.dice-cube{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;transition:transform .1s ease-out;
}
.dice-cube.rolling{animation:dice-tumble .65s cubic-bezier(.2,.8,.3,1)}
@keyframes dice-tumble{
  0%{transform:rotateX(20deg) rotateY(0) scale(.9)}
  25%{transform:rotateX(350deg) rotateY(200deg) rotateZ(-40deg) scale(1.1)}
  55%{transform:rotateX(680deg) rotateY(280deg) rotateZ(-20deg) scale(1.04)}
  100%{transform:rotateX(1000deg) rotateY(0) rotateZ(0) scale(1)}
}
.dice-face{
  position:absolute;width:100%;height:100%;border-radius:18%;
  display:grid;padding:17%;box-sizing:border-box;backface-visibility:visible;
  grid-template:1fr 1fr 1fr / 1fr 1fr 1fr;gap:6%;
  background:linear-gradient(145deg,#fff 0%,#f5f5f5 40%,#e8e8e8 100%);
  box-shadow:inset 0 2px 8px rgba(255,255,255,.9),inset 0 -3px 8px rgba(0,0,0,.12);
  border:1.5px solid rgba(0,0,0,.06);
}
.dice-pip{
  width:100%;height:100%;border-radius:50%;
  background:radial-gradient(circle at 38% 38%,#666,#1a1a1a 70%);
  box-shadow:inset 0 1px 2px rgba(255,255,255,.25),0 1px 3px rgba(0,0,0,.4);
}
.pip-red{background:radial-gradient(circle at 38% 38%,#f87171,#b91c1c 70%);box-shadow:inset 0 1px 2px rgba(255,255,255,.3),0 1px 3px rgba(185,28,28,.5)}
.pip-blue{background:radial-gradient(circle at 38% 38%,#60a5fa,#1d4ed8 70%);box-shadow:inset 0 1px 2px rgba(255,255,255,.3),0 1px 3px rgba(29,78,216,.5)}

/* Face transforms */
.dice-face-1{transform:rotateY(0deg) translateZ(27px)}
.dice-face-2{transform:rotateY(90deg) translateZ(27px)}
.dice-face-3{transform:rotateX(90deg) translateZ(27px)}
.dice-face-4{transform:rotateX(-90deg) translateZ(27px)}
.dice-face-5{transform:rotateY(-90deg) translateZ(27px)}
.dice-face-6{transform:rotateY(180deg) translateZ(27px)}
/* Show transforms */
.dice-show-1{transform:rotateY(0deg) rotateX(0deg)}
.dice-show-2{transform:rotateY(-90deg) rotateX(0deg)}
.dice-show-3{transform:rotateX(-90deg) rotateY(0deg)}
.dice-show-4{transform:rotateX(90deg) rotateY(0deg)}
.dice-show-5{transform:rotateY(90deg) rotateX(0deg)}
.dice-show-6{transform:rotateY(180deg) rotateX(0deg)}
.dice-cube.landed{animation:dice-land .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes dice-land{
  0%{transform:var(--land-transform) scale(1.12)}
  50%{transform:var(--land-transform) scale(.94)}
  100%{transform:var(--land-transform) scale(1)}
}
.dice-shadow{
  width:50%;height:8px;
  background:radial-gradient(ellipse,rgba(0,0,0,.4) 0%,transparent 70%);
  border-radius:50%;margin:2px auto 0;transition:all .3s;
}
.dice-shadow.rolling{width:32%;opacity:.3;transform:translateY(-3px)}

/* ── Roll Button ── */
.roll-btn{
  padding:6px 22px;border-radius:50px;font-size:13px;font-weight:900;
  letter-spacing:.1em;border:2px solid #374151;color:#fff;background:#374151;
  cursor:pointer;transition:all .2s;box-shadow:0 4px 12px rgba(0,0,0,.4);
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.roll-btn:not(:disabled):hover{transform:scale(1.06)}
.roll-btn:not(:disabled):active{transform:scale(.94)}
.roll-btn:disabled{opacity:.45;cursor:not-allowed}
.roll-btn.roll-red{background:#f87171;border-color:#991b1b;box-shadow:0 4px 20px rgba(248,113,113,.5)}
.roll-btn.roll-blue{background:#60a5fa;border-color:#1d4ed8;box-shadow:0 4px 20px rgba(96,165,250,.5)}

/* ── Glow Ring ── */
.dice-glow-ring{
  position:absolute;inset:-8px;border-radius:24%;
  opacity:0;transition:opacity .4s,box-shadow .4s;pointer-events:none;z-index:-1;
}
.dice-glow-ring.active{opacity:1}

/* ── Win Overlay ── */
.win-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.82);
  display:none;align-items:center;justify-content:center;
  z-index:100;backdrop-filter:blur(8px);
}
.win-overlay.show{display:flex}
.win-content{
  text-align:center;color:#fff;
  animation:pop-in .4s cubic-bezier(.34,1.56,.64,1);
  background:#1f2937;border-radius:22px;padding:28px 24px;
  border:3px solid #f59e0b;box-shadow:0 12px 48px rgba(0,0,0,.4);
  max-width:320px;width:90%;
}
@keyframes pop-in{from{transform:scale(0) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.win-content .trophy{font-size:3.5rem;margin-bottom:6px}
.win-content h2{font-size:1.4rem;font-weight:900;margin-bottom:2px}
.win-content .winner-name{font-size:1rem;font-weight:800;margin-bottom:14px}
.win-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.win-stat{background:rgba(255,255,255,.08);border-radius:12px;padding:10px 8px}
.win-stat .sv{font-size:1.1rem;font-weight:900}
.win-stat .sl{font-size:.6rem;color:#6b7280;margin-top:2px}
.play-again-btn{
  padding:10px 32px;border:none;border-radius:50px;
  background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;
  font-size:.95rem;font-weight:800;cursor:pointer;
  box-shadow:0 3px 12px rgba(245,158,11,.4);transition:all .2s;
}
.play-again-btn:hover{transform:scale(1.05)}

/* ── Start Screen ── */
.start-screen{
  position:fixed;inset:0;background:#111827;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;transition:opacity .5s;
}
.start-screen.hidden{opacity:0;pointer-events:none}
.start-screen h1{font-size:clamp(1.8rem,7vw,3rem);font-weight:900;color:#fff;text-align:center}
.start-screen .subtitle{color:#6b7280;font-size:.85rem;font-weight:600}
.start-screen .art{font-size:4rem;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.start-btn{
  font-size:1.15rem;font-weight:900;padding:13px 52px;border:none;border-radius:50px;
  background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;
  cursor:pointer;box-shadow:0 4px 24px rgba(245,158,11,.35);transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.start-btn:hover{transform:scale(1.05)}

/* Event Toast */
.event-toast{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.5);
  font-size:24px;font-weight:900;color:#fff;padding:8px 20px;
  border-radius:16px;z-index:50;opacity:0;pointer-events:none;
  transition:all .25s;text-shadow:0 3px 8px rgba(0,0,0,.8);
}

@media(max-height:650px){
  .board-wrapper{width:min(calc(100vw - 16px), calc(100dvh - 180px))}
  .bottom-bar{width:min(calc(100vw - 16px), calc(100dvh - 180px))}
}
</style>
</head>
<body>

<!-- ══ Start Screen ══ -->
<div class="start-screen" id="startScreen">
  <div class="art">🐍🎲🪜</div>
  <h1>Snakes & Ladders</h1>
  <p class="subtitle">2-Player Duel • Pass & Play</p>
  <button class="start-btn" onclick="startGame()">Start Game</button>
</div>

<!-- ══ Game Container ══ -->
<div class="game-container" id="gameContainer">

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-left">
      <button class="icon-btn" onclick="goBack()" title="Exit">✕</button>
      <button class="icon-btn" id="micBtn" onclick="toggleMic()" title="Mic">🎤</button>
      <button class="icon-btn" id="spkBtn" onclick="toggleSpeaker()" title="Speaker">🔊</button>
    </div>
    <div class="round-badge" id="scoreBoard">P1: 0 | P2: 0</div>
  </div>

  <!-- Instruction -->
  <div class="instruction" id="instruction">Player 1's turn — tap ROLL!</div>

  <!-- Board -->
  <div class="board-wrapper">
    <div class="board-inner" id="boardInner">
      <canvas id="canvas"></canvas>
    </div>
    <div class="event-toast" id="eventToast"></div>
  </div>

  <!-- Bottom Bar: Red Panel | Dice | Blue Panel -->
  <div class="bottom-bar">
    <!-- Player 1 (Red) -->
    <div class="player-panel panel-red active-turn" id="panelP1">
      <div class="panel-avatar">🔴</div>
      <div class="panel-name">Player 1</div>
      <div class="panel-pos" id="posP1">Tile 1</div>
    </div>

    <!-- Center Dice -->
    <div class="center-dice">
      <div class="dice-scene" id="diceScene">
        <div class="dice-glow-ring" id="diceGlowRing"></div>
        <div class="dice-cube dice-show-1" id="diceCube">
          <!-- Face 1 -->
          <div class="dice-face dice-face-1"><div style="grid-area:2/2"><div class="dice-pip" id="pip-1-1"></div></div></div>
          <!-- Face 2 -->
          <div class="dice-face dice-face-2">
            <div style="grid-area:1/3"><div class="dice-pip" id="pip-2-1"></div></div>
            <div style="grid-area:3/1"><div class="dice-pip" id="pip-2-2"></div></div>
          </div>
          <!-- Face 3 -->
          <div class="dice-face dice-face-3">
            <div style="grid-area:1/3"><div class="dice-pip" id="pip-3-1"></div></div>
            <div style="grid-area:2/2"><div class="dice-pip" id="pip-3-2"></div></div>
            <div style="grid-area:3/1"><div class="dice-pip" id="pip-3-3"></div></div>
          </div>
          <!-- Face 4 -->
          <div class="dice-face dice-face-4">
            <div style="grid-area:1/1"><div class="dice-pip" id="pip-4-1"></div></div>
            <div style="grid-area:1/3"><div class="dice-pip" id="pip-4-2"></div></div>
            <div style="grid-area:3/1"><div class="dice-pip" id="pip-4-3"></div></div>
            <div style="grid-area:3/3"><div class="dice-pip" id="pip-4-4"></div></div>
          </div>
          <!-- Face 5 -->
          <div class="dice-face dice-face-5">
            <div style="grid-area:1/1"><div class="dice-pip" id="pip-5-1"></div></div>
            <div style="grid-area:1/3"><div class="dice-pip" id="pip-5-2"></div></div>
            <div style="grid-area:2/2"><div class="dice-pip" id="pip-5-3"></div></div>
            <div style="grid-area:3/1"><div class="dice-pip" id="pip-5-4"></div></div>
            <div style="grid-area:3/3"><div class="dice-pip" id="pip-5-5"></div></div>
          </div>
          <!-- Face 6 -->
          <div class="dice-face dice-face-6">
            <div style="grid-area:1/1"><div class="dice-pip" id="pip-6-1"></div></div>
            <div style="grid-area:2/1"><div class="dice-pip" id="pip-6-2"></div></div>
            <div style="grid-area:3/1"><div class="dice-pip" id="pip-6-3"></div></div>
            <div style="grid-area:1/3"><div class="dice-pip" id="pip-6-4"></div></div>
            <div style="grid-area:2/3"><div class="dice-pip" id="pip-6-5"></div></div>
            <div style="grid-area:3/3"><div class="dice-pip" id="pip-6-6"></div></div>
          </div>
        </div>
      </div>
      <div class="dice-shadow" id="diceShadow"></div>
      <button class="roll-btn roll-red" id="rollBtn" onclick="rollDice()">ROLL</button>
    </div>

    <!-- Player 2 (Blue) -->
    <div class="player-panel panel-blue" id="panelP2">
      <div class="panel-avatar">🔵</div>
      <div class="panel-name">Player 2</div>
      <div class="panel-pos" id="posP2">Tile 1</div>
    </div>
  </div>
</div>

<!-- ══ Win Overlay ══ -->
<div class="win-overlay" id="winOverlay">
  <div class="win-content">
    <div class="trophy">🏆</div>
    <h2>Victory!</h2>
    <div class="winner-name" id="winnerName" style="color:#fca5a5">Player 1 Wins!</div>
    <div class="win-stats">
      <div class="win-stat"><div class="sv" id="statMoves">0</div><div class="sl">Total Moves</div></div>
      <div class="win-stat"><div class="sv" id="statTime">0s</div><div class="sl">Duration</div></div>
      <div class="win-stat"><div class="sv" id="statSnakes">0</div><div class="sl">🐍 Bitten</div></div>
      <div class="win-stat"><div class="sv" id="statLadders">0</div><div class="sl">🪜 Climbed</div></div>
    </div>
    <button class="play-again-btn" onclick="resetGame()">Play Again 🎲</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  SNAKES & LADDERS — Ludo-Style UI
// ═══════════════════════════════════════════════

const ROWS = 10, COLS = 10, TOTAL = 100;

// User's exact snake/ladder data
const snakes = {
  99:78, 97:79, 93:73, 90:70, 84:63, 76:56, 74:53,
  71:51, 66:45, 59:38, 52:31, 47:26, 39:22, 34:13, 18:6
};
const ladders = {
  2:23, 8:29, 17:37, 21:42, 25:46, 36:55, 44:65,
  54:73, 62:82, 64:85, 68:89, 81:98
};

// Snake colors (colorful like the reference image)
const snakeColors = {
  99:{body:'#2196F3',belly:'#64B5F6'},   // blue
  97:{body:'#4CAF50',belly:'#81C784'},   // green
  93:{body:'#4CAF50',belly:'#A5D6A7'},   // green
  90:{body:'#4CAF50',belly:'#66BB6A'},   // green
  84:{body:'#2196F3',belly:'#90CAF9'},   // blue
  76:{body:'#2196F3',belly:'#64B5F6'},   // blue
  74:{body:'#9C27B0',belly:'#CE93D8'},   // purple
  71:{body:'#4CAF50',belly:'#81C784'},   // green
  66:{body:'#9C27B0',belly:'#BA68C8'},   // purple
  59:{body:'#4CAF50',belly:'#A5D6A7'},   // green
  52:{body:'#2196F3',belly:'#90CAF9'},   // blue
  47:{body:'#9C27B0',belly:'#CE93D8'},   // purple
  39:{body:'#4CAF50',belly:'#66BB6A'},   // green
  34:{body:'#2196F3',belly:'#64B5F6'},   // blue
  18:{body:'#9C27B0',belly:'#BA68C8'}    // purple
};

// Tile background colors (matching the colorful reference board)
const tileColorMap = {};
(function buildTileColors(){
  // Row colors from bottom: red, yellow, orange, yellow...
  const rowPalettes = [
    ['#F44336','#FFEB3B','#F44336','#FFEB3B','#FF9800','#FFEB3B','#FF9800','#F44336','#FFEB3B','#FF9800'], // row 1 (1-10)
    ['#FF9800','#F44336','#FFEB3B','#FF9800','#FFEB3B','#F44336','#FFEB3B','#FF9800','#F44336','#FFEB3B'], // row 2 (11-20)
    ['#FFEB3B','#F44336','#FFEB3B','#FF9800','#FF9800','#FFEB3B','#FF9800','#F44336','#FFEB3B','#FF9800'], // row 3
    ['#FF9800','#FFEB3B','#F44336','#FFEB3B','#FF9800','#F44336','#FFEB3B','#FF9800','#F44336','#FFEB3B'], // row 4
    ['#FFEB3B','#FF9800','#FFEB3B','#F44336','#FFEB3B','#FF9800','#F44336','#FFEB3B','#FF9800','#F44336'], // row 5
    ['#F44336','#FFEB3B','#FF9800','#FFEB3B','#F44336','#FFEB3B','#FF9800','#FFEB3B','#F44336','#FF9800'], // row 6
    ['#FF9800','#F44336','#FFEB3B','#FF9800','#FFEB3B','#F44336','#FFEB3B','#FF9800','#F44336','#FFEB3B'], // row 7
    ['#FFEB3B','#FF9800','#F44336','#FFEB3B','#FF9800','#FFEB3B','#F44336','#FF9800','#FFEB3B','#F44336'], // row 8
    ['#FF9800','#FFEB3B','#FF9800','#F44336','#FFEB3B','#FF9800','#FFEB3B','#F44336','#FFEB3B','#FF9800'], // row 9
    ['#F44336','#FF9800','#FFEB3B','#F44336','#FFEB3B','#FFEB3B','#FF9800','#FFEB3B','#F44336','#FFEB3B']  // row 10 (91-100)
  ];
  for(let tile=1;tile<=100;tile++){
    const row = Math.floor((tile-1)/10);
    const col = (tile-1)%10;
    const actualCol = row%2===0 ? col : 9-col;
    tileColorMap[tile] = rowPalettes[row][actualCol];
  }
})();

// Players
const players = [
  {id:1, pos:0, color:'#f87171', glow:'rgba(248,113,113,.6)', border:'#991b1b', emoji:'🔴', moves:0, snakesBit:0, laddersClimbed:0},
  {id:2, pos:0, color:'#60a5fa', glow:'rgba(96,165,250,.6)', border:'#1d4ed8', emoji:'🔵', moves:0, snakesBit:0, laddersClimbed:0}
];
let currentPlayer = 0, rolling = false, gameOver = false, startTime = 0;
let scores = [0, 0];

// Audio
let soundEnabled = true, micEnabled = true;

// Canvas
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let cs = 0, boardPx = 0;

// 3D Dice transforms
const DICE_SHOW = {1:'dice-show-1',2:'dice-show-2',3:'dice-show-3',4:'dice-show-4',5:'dice-show-5',6:'dice-show-6'};
const DICE_TRANSFORMS = {
  1:'rotateY(0deg) rotateX(0deg)', 2:'rotateY(-90deg) rotateX(0deg)',
  3:'rotateX(-90deg) rotateY(0deg)', 4:'rotateX(90deg) rotateY(0deg)',
  5:'rotateY(90deg) rotateX(0deg)', 6:'rotateY(180deg) rotateX(0deg)'
};

// Sound effects using Web Audio API
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
  if (!soundEnabled) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  gain.gain.value = 0.15;

  switch(type) {
    case 'roll':
      osc.type = 'square'; osc.frequency.value = 200;
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
      osc.start(); osc.stop(audioCtx.currentTime + 0.15);
      break;
    case 'move':
      osc.type = 'sine'; osc.frequency.value = 440;
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
      osc.start(); osc.stop(audioCtx.currentTime + 0.08);
      break;
    case 'ladder':
      osc.type = 'sine'; osc.frequency.value = 523;
      gain.gain.value = 0.2;
      osc.frequency.exponentialRampToValueAtTime(1047, audioCtx.currentTime + 0.3);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
      osc.start(); osc.stop(audioCtx.currentTime + 0.4);
      break;
    case 'snake':
      osc.type = 'sawtooth'; osc.frequency.value = 600;
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.4);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc.start(); osc.stop(audioCtx.currentTime + 0.5);
      break;
    case 'win':
      osc.type = 'sine'; osc.frequency.value = 523;
      gain.gain.value = 0.2;
      setTimeout(() => {
        const o2 = audioCtx.createOscillator();
        const g2 = audioCtx.createGain();
        o2.connect(g2); g2.connect(audioCtx.destination);
        o2.type = 'sine'; o2.frequency.value = 659; g2.gain.value = 0.2;
        g2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        o2.start(); o2.stop(audioCtx.currentTime + 0.3);
      }, 150);
      setTimeout(() => {
        const o3 = audioCtx.createOscillator();
        const g3 = audioCtx.createGain();
        o3.connect(g3); g3.connect(audioCtx.destination);
        o3.type = 'sine'; o3.frequency.value = 784; g3.gain.value = 0.25;
        g3.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        o3.start(); o3.stop(audioCtx.currentTime + 0.5);
      }, 300);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
      osc.start(); osc.stop(audioCtx.currentTime + 0.3);
      break;
  }
}

// ── Tile position helpers ──
function tileToRC(tile) {
  const t = tile - 1, row = Math.floor(t / COLS), col = t % COLS;
  return { r: ROWS - 1 - row, c: row % 2 === 0 ? col : COLS - 1 - col };
}
function tilePt(tile) {
  const { r, c } = tileToRC(tile);
  return { x: c * cs + cs / 2, y: r * cs + cs / 2 };
}

// ── Resize ──
function resize() {
  const wrap = document.getElementById('boardInner');
  const cont = wrap.parentElement;
  boardPx = Math.min(cont.clientWidth, cont.clientHeight);
  wrap.style.width = boardPx + 'px';
  wrap.style.height = boardPx + 'px';
  cs = boardPx / COLS;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = boardPx * dpr;
  canvas.height = boardPx * dpr;
  canvas.style.width = boardPx + 'px';
  canvas.style.height = boardPx + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  drawBoard();
}

// ═══════════════════════════════════
//  DRAWING
// ═══════════════════════════════════

function drawBoard() {
  ctx.clearRect(0, 0, boardPx, boardPx);

  // Draw tiles with colorful backgrounds
  for (let tile = 1; tile <= TOTAL; tile++) {
    const { r, c } = tileToRC(tile);
    const x = c * cs, y = r * cs;

    // Tile color from reference palette
    ctx.fillStyle = tileColorMap[tile] || '#FFEB3B';
    ctx.fillRect(x, y, cs, cs);

    // Grid lines
    ctx.strokeStyle = 'rgba(0,0,0,.1)';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x, y, cs, cs);

    // Tile number
    ctx.fillStyle = 'rgba(0,0,0,.55)';
    ctx.font = `800 ${Math.max(cs * .22, 7)}px Inter`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(tile, x + cs * .06, y + cs * .04);
  }

  // Draw ladders (behind snakes)
  for (const [b, t] of Object.entries(ladders)) drawLadder(+b, +t);
  // Draw snakes (on top)
  for (const [h, t] of Object.entries(snakes)) drawSnake(+h, +t);
  // Draw player tokens
  drawTokens();
}

// ── Smooth Snake ──
function drawSnake(head, tail) {
  const a = tilePt(head), b = tilePt(tail);
  const col = snakeColors[head] || { body: '#e84393', belly: '#fd79a8' };
  const dx = b.x - a.x, dy = b.y - a.y;
  const len = Math.sqrt(dx * dx + dy * dy);

  // Build curvy path
  const N = 48, pts = [];
  for (let i = 0; i <= N; i++) {
    const t = i / N;
    const amp = cs * .4 * Math.sin(t * Math.PI);
    const freq = 3 + Math.floor(len / (cs * 2));
    pts.push({
      x: a.x + dx * t + Math.sin(t * Math.PI * freq) * amp,
      y: a.y + dy * t + Math.cos(t * Math.PI * freq) * amp * .3
    });
  }

  ctx.save();
  // Shadow
  ctx.strokeStyle = 'rgba(0,0,0,.12)'; ctx.lineWidth = cs * .22 + 2;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); pts.forEach((p, i) => i ? ctx.lineTo(p.x + 1, p.y + 2) : ctx.moveTo(p.x + 1, p.y + 2)); ctx.stroke();

  // Body gradient
  const g = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
  g.addColorStop(0, col.body); g.addColorStop(.5, col.belly); g.addColorStop(1, col.body);
  ctx.strokeStyle = g; ctx.lineWidth = cs * .2;
  ctx.beginPath(); pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y)); ctx.stroke();

  // Belly shine
  ctx.strokeStyle = 'rgba(255,255,255,.22)'; ctx.lineWidth = cs * .06;
  ctx.beginPath(); pts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y - 1) : ctx.moveTo(p.x, p.y - 1)); ctx.stroke();

  // Head
  ctx.fillStyle = col.body;
  ctx.beginPath(); ctx.arc(a.x, a.y, cs * .22, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,.15)'; ctx.lineWidth = 1; ctx.stroke();

  // Eyes
  const eo = cs * .08;
  [[-1, 1], [1, 1]].forEach(([sx]) => {
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(a.x + sx * eo, a.y - eo * .6, cs * .06, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(a.x + sx * eo, a.y - eo * .6, cs * .028, 0, Math.PI * 2); ctx.fill();
  });

  // Tongue
  ctx.strokeStyle = '#d32f2f'; ctx.lineWidth = Math.max(1, cs * .025); ctx.lineCap = 'round';
  const td = dy > 0 ? 1 : -1;
  ctx.beginPath(); ctx.moveTo(a.x, a.y + cs * .15 * td); ctx.lineTo(a.x - cs * .06, a.y + cs * .26 * td); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(a.x, a.y + cs * .15 * td); ctx.lineTo(a.x + cs * .06, a.y + cs * .26 * td); ctx.stroke();

  // Tail
  const tp = pts[pts.length - 1];
  ctx.fillStyle = col.body;
  ctx.beginPath(); ctx.arc(tp.x, tp.y, cs * .06, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// ── Wooden Ladder ──
function drawLadder(bottom, top) {
  const a = tilePt(bottom), b = tilePt(top);
  const dx = b.x - a.x, dy = b.y - a.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  const nx = -dy / len * (cs * .2), ny = dx / len * (cs * .2);

  ctx.save(); ctx.lineCap = 'round';

  // Shadow
  ctx.strokeStyle = 'rgba(0,0,0,.08)'; ctx.lineWidth = cs * .09 + 1;
  ctx.beginPath(); ctx.moveTo(a.x + nx + 1, a.y + ny + 2); ctx.lineTo(b.x + nx + 1, b.y + ny + 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(a.x - nx + 1, a.y - ny + 2); ctx.lineTo(b.x - nx + 1, b.y - ny + 2); ctx.stroke();

  // Rails (brown)
  ctx.strokeStyle = '#5D4037'; ctx.lineWidth = cs * .08;
  ctx.beginPath(); ctx.moveTo(a.x + nx, a.y + ny); ctx.lineTo(b.x + nx, b.y + ny); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(a.x - nx, a.y - ny); ctx.lineTo(b.x - nx, b.y - ny); ctx.stroke();

  // Highlight
  ctx.strokeStyle = 'rgba(255,255,255,.15)'; ctx.lineWidth = cs * .025;
  ctx.beginPath(); ctx.moveTo(a.x + nx * .6, a.y + ny * .6); ctx.lineTo(b.x + nx * .6, b.y + ny * .6); ctx.stroke();

  // Rungs
  const rungs = Math.max(Math.round(len / (cs * .5)), 2);
  for (let i = 1; i < rungs; i++) {
    const t = i / rungs;
    const cx = a.x + dx * t, cy = a.y + dy * t;
    ctx.strokeStyle = '#5D4037'; ctx.lineWidth = cs * .05;
    ctx.beginPath(); ctx.moveTo(cx + nx, cy + ny); ctx.lineTo(cx - nx, cy - ny); ctx.stroke();
    // X marks
    const cdx = dx / len * cs * .07, cdy = dy / len * cs * .07;
    ctx.strokeStyle = 'rgba(93,64,55,.45)'; ctx.lineWidth = cs * .025;
    const lx = cx + nx * .5, ly = cy + ny * .5;
    ctx.beginPath(); ctx.moveTo(lx - cdx - nx * .15, ly - cdy - ny * .15); ctx.lineTo(lx + cdx + nx * .15, ly + cdy + ny * .15); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lx - cdx + nx * .15, ly - cdy + ny * .15); ctx.lineTo(lx + cdx - nx * .15, ly + cdy - ny * .15); ctx.stroke();
  }
  ctx.restore();
}

// ── Player Tokens ──
function drawTokens() {
  const groups = {};
  players.forEach((p, i) => {
    if (p.pos < 1) return; // not on board yet
    if (!groups[p.pos]) groups[p.pos] = [];
    groups[p.pos].push(i);
  });

  for (const [pos, idxs] of Object.entries(groups)) {
    const c = tilePt(+pos);
    idxs.forEach((pi, oi) => {
      const off = (oi - (idxs.length - 1) / 2) * cs * .3;
      const tx = c.x + off, ty = c.y;
      const p = players[pi];

      ctx.save();
      // Drop shadow
      ctx.fillStyle = 'rgba(0,0,0,.18)';
      ctx.beginPath(); ctx.ellipse(tx + 1, ty + cs * .2, cs * .2, cs * .07, 0, 0, Math.PI * 2); ctx.fill();

      // Glow + body
      ctx.shadowColor = p.glow; ctx.shadowBlur = cs * .6;
      const gr = ctx.createRadialGradient(tx - cs * .05, ty - cs * .08, cs * .02, tx, ty, cs * .28);
      gr.addColorStop(0, 'rgba(255,255,255,.55)'); gr.addColorStop(.45, p.color); gr.addColorStop(1, p.color);
      ctx.fillStyle = gr;
      ctx.beginPath(); ctx.arc(tx, ty, cs * .27, 0, Math.PI * 2); ctx.fill();
      ctx.restore();

      // Border
      ctx.strokeStyle = 'rgba(255,255,255,.6)'; ctx.lineWidth = Math.max(1.5, cs * .04);
      ctx.beginPath(); ctx.arc(tx, ty, cs * .27, 0, Math.PI * 2); ctx.stroke();

      // Label
      ctx.fillStyle = '#fff'; ctx.font = `900 ${Math.max(cs * .24, 9)}px Inter`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('P' + p.id, tx, ty + 1);
    });
  }
}

// ═══════════════════════════════════
//  ANIMATIONS
// ═══════════════════════════════════

function animateMove(pIdx, from, to, cb) {
  let cur = from;
  const dir = to > from ? 1 : -1;
  (function step() {
    cur += dir;
    players[pIdx].pos = cur;
    drawBoard();
    playSound('move');
    cur === to ? setTimeout(cb, 60) : setTimeout(step, 90);
  })();
}

function animateSlide(pIdx, from, to, cb) {
  const dur = 420, t0 = performance.now();
  const a = tilePt(from), b = tilePt(to);
  (function frame(now) {
    const t = Math.min((now - t0) / dur, 1);
    const e = t < .5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    const px = a.x + (b.x - a.x) * e, py = a.y + (b.y - a.y) * e;
    drawBoard();
    const p = players[pIdx];
    ctx.save(); ctx.shadowColor = p.glow; ctx.shadowBlur = cs * .8;
    ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(px, py, cs * .3, 0, Math.PI * 2); ctx.fill(); ctx.restore();
    ctx.strokeStyle = 'rgba(255,255,255,.6)'; ctx.lineWidth = Math.max(1.5, cs * .04);
    ctx.beginPath(); ctx.arc(px, py, cs * .3, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = `900 ${Math.max(cs * .26, 10)}px Inter`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('P' + p.id, px, py + 1);
    if (t < 1) requestAnimationFrame(frame);
    else { players[pIdx].pos = to; drawBoard(); cb(); }
  })(performance.now());
}

// ── Event Toast ──
function showToast(msg, bg) {
  const el = document.getElementById('eventToast');
  el.textContent = msg;
  el.style.background = bg || 'rgba(0,0,0,.7)';
  el.style.opacity = '1';
  el.style.transform = 'translate(-50%,-50%) scale(1)';
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translate(-50%,-50%) scale(.5)';
  }, 1200);
}

// ═══════════════════════════════════
//  3D DICE
// ═══════════════════════════════════

function animateDice(result, cb) {
  const cube = document.getElementById('diceCube');
  const shadow = document.getElementById('diceShadow');
  const glow = document.getElementById('diceGlowRing');
  const p = players[currentPlayer];

  // Color pips
  const pipClass = currentPlayer === 0 ? 'pip-red' : 'pip-blue';
  cube.querySelectorAll('.dice-pip').forEach(el => {
    el.className = 'dice-pip ' + pipClass;
  });

  // Glow ring
  glow.style.boxShadow = `0 0 20px 6px ${p.glow}`;
  glow.classList.add('active');

  // Remove old show class
  cube.className = 'dice-cube';
  shadow.classList.add('rolling');

  // Start tumble
  playSound('roll');
  cube.classList.add('rolling');

  setTimeout(() => {
    cube.classList.remove('rolling');
    shadow.classList.remove('rolling');

    // Show result face
    const showClass = DICE_SHOW[result];
    cube.className = 'dice-cube ' + showClass;

    // Land bounce
    cube.style.setProperty('--land-transform', DICE_TRANSFORMS[result]);
    cube.classList.add('landed');
    setTimeout(() => cube.classList.remove('landed'), 300);

    // Fade glow
    setTimeout(() => glow.classList.remove('active'), 600);

    cb();
  }, 700);
}

// ═══════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════

function rollDice() {
  if (rolling || gameOver) return;
  // Resume audio context (required by browsers)
  if (audioCtx.state === 'suspended') audioCtx.resume();

  rolling = true;
  document.getElementById('rollBtn').disabled = true;
  const result = Math.floor(Math.random() * 6) + 1;

  animateDice(result, () => {
    afterRoll(result);
  });
}

function afterRoll(dice) {
  const p = players[currentPlayer];
  p.moves++;
  const oldPos = p.pos;
  const np = oldPos + dice;
  const inst = document.getElementById('instruction');

  // Not on board yet — need to roll 1 or 6 to enter (optional: always enter)
  // Simplify: always move from current position
  if (oldPos === 0) {
    // First entry: place at tile = dice value
    animateMove(currentPlayer, 1, dice, () => {
      checkSnakeOrLadder(dice);
    });
    return;
  }

  if (np > 100) {
    inst.textContent = `Need exactly ${100 - p.pos} to win — turn passed!`;
    showToast('Too high! ❌', 'rgba(239,68,68,.85)');
    endTurn();
    return;
  }

  animateMove(currentPlayer, oldPos, np, () => {
    checkSnakeOrLadder(np);
  });
}

function checkSnakeOrLadder(pos) {
  const inst = document.getElementById('instruction');

  if (ladders[pos]) {
    const dest = ladders[pos];
    players[currentPlayer].laddersClimbed++;
    inst.textContent = `🪜 Ladder! ${pos} → ${dest}`;
    showToast('🪜 Ladder!', 'rgba(34,197,94,.85)');
    playSound('ladder');
    setTimeout(() => animateSlide(currentPlayer, pos, dest, () => finish(dest)), 300);
  } else if (snakes[pos]) {
    const dest = snakes[pos];
    players[currentPlayer].snakesBit++;
    inst.textContent = `🐍 Snake bite! ${pos} → ${dest}`;
    showToast('🐍 Snake!', 'rgba(239,68,68,.85)');
    playSound('snake');
    setTimeout(() => animateSlide(currentPlayer, pos, dest, () => finish(dest)), 300);
  } else {
    finish(pos);
  }
}

function finish(pos) {
  players[currentPlayer].pos = pos;
  updateUI();
  if (pos === 100) { win(); return; }
  endTurn();
}

function endTurn() {
  currentPlayer = 1 - currentPlayer;
  updateUI();
  rolling = false;
  document.getElementById('rollBtn').disabled = false;
}

function updateUI() {
  document.getElementById('posP1').textContent = players[0].pos > 0 ? 'Tile ' + players[0].pos : 'Start';
  document.getElementById('posP2').textContent = players[1].pos > 0 ? 'Tile ' + players[1].pos : 'Start';

  const p1 = document.getElementById('panelP1');
  const p2 = document.getElementById('panelP2');
  p1.classList.toggle('active-turn', currentPlayer === 0);
  p2.classList.toggle('active-turn', currentPlayer === 1);

  // Roll button color
  const btn = document.getElementById('rollBtn');
  btn.className = 'roll-btn ' + (currentPlayer === 0 ? 'roll-red' : 'roll-blue');

  if (!gameOver) {
    document.getElementById('instruction').textContent = `Player ${currentPlayer + 1}'s turn — tap ROLL!`;
  }

  // Score board
  document.getElementById('scoreBoard').textContent = `P1: ${scores[0]} | P2: ${scores[1]}`;

  drawBoard();
}

function win() {
  gameOver = true;
  rolling = false;
  const p = players[currentPlayer];
  scores[currentPlayer]++;
  playSound('win');

  const el = Math.floor((Date.now() - startTime) / 1000);
  document.getElementById('winnerName').textContent = `Player ${p.id} Wins!`;
  document.getElementById('winnerName').style.color = p.color;
  document.getElementById('statMoves').textContent = p.moves;
  const m = Math.floor(el / 60), s = el % 60;
  document.getElementById('statTime').textContent = m ? `${m}m ${s}s` : `${s}s`;
  document.getElementById('statSnakes').textContent = p.snakesBit;
  document.getElementById('statLadders').textContent = p.laddersClimbed;

  document.getElementById('instruction').textContent = `🏆 Player ${p.id} wins!`;
  showToast('🏆 Victory!', p.color);

  setTimeout(() => document.getElementById('winOverlay').classList.add('show'), 800);
}

function resetGame() {
  players.forEach(p => { p.pos = 0; p.moves = 0; p.snakesBit = 0; p.laddersClimbed = 0; });
  currentPlayer = 0; gameOver = false; rolling = false;
  document.getElementById('rollBtn').disabled = false;
  document.getElementById('winOverlay').classList.remove('show');
  startTime = Date.now();
  updateUI();
}

// ═══════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════

function goBack() {
  if (confirm('Exit the game?')) {
    if (window.history.length > 1) window.history.back();
  }
}

function toggleMic() {
  micEnabled = !micEnabled;
  const btn = document.getElementById('micBtn');
  btn.textContent = micEnabled ? '🎤' : '🎤';
  btn.classList.toggle('muted', !micEnabled);
  if (window.voiceChat) window.voiceChat.toggleMic();
}

function toggleSpeaker() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('spkBtn');
  btn.textContent = soundEnabled ? '🔊' : '🔇';
  btn.classList.toggle('muted', !soundEnabled);
  if (window.voiceChat) window.voiceChat.toggleSpeaker();
}

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  startTime = Date.now();
  resize();
  updateUI();
}

window.addEventListener('resize', () => {
  if (document.getElementById('startScreen').classList.contains('hidden')) resize();
});
window.addEventListener('load', resize);
</script>
